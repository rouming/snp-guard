syntax = "proto3";
package snpguard;

// Messages used by attestation clients and management tools over HTTPS+protobuf (no gRPC services)

// Attestation messages
message NonceRequest {
}

message NonceResponse {
  bytes nonce = 1;  // Exactly 64 bytes
}

message AttestationRequest {
  bytes report_data = 1;           // SEV-SNP attestation report (binary)
  bytes server_nonce = 2;           // Server nonce (64 bytes) used for binding
  bytes client_pub_bytes = 3;       // X25519 Session Public Key (32 bytes)
  bytes sealed_blob = 4;           // HPKE-encrypted VMK blob [Encapped_Key (32 bytes) || Ciphertext]
}

message AttestationResponse {
  bool success = 1;
  bytes encapped_key = 2;          // HPKE Encapsulated Key (32 bytes) - Server Ephemeral Pub
  bytes ciphertext = 3;             // Session-encrypted VMK (HPKE ciphertext)
  string error_message = 4;         // Error message if success is false
}

// Renewal messages (guest-initiated, sent from inside the running VM)
//
// Binding: report_data = SHA512(payload_bytes), where payload_bytes is the
// pre-serialized RenewRequestPayload.  The server hashes these exact bytes
// without re-encoding, so determinism and forward compatibility are guaranteed.
message RenewRequest {
  bytes report_data = 1;  // SEV-SNP attestation report (binary)
  bytes payload_bytes = 2; // pre-serialized RenewRequestPayload
}

// Serialized into RenewRequest.payload_bytes; all fields are hardware-signed.
// Absent optional artifact fields are inherited from the current record on the server.
message RenewRequestPayload {
  bytes server_nonce = 1;           // Server nonce (64 bytes); proves freshness
  bytes client_nonce = 2;           // Client nonce (64 bytes); prevents response replay
  optional bytes firmware = 3;
  optional bytes kernel = 4;
  optional bytes initrd = 5;
  optional string kernel_params = 6;
}

message RenewResponse {
  bool success = 1;
  optional string error_message = 2;
  optional bytes signature = 3;    // Ed25519 over payload_bytes; verify BEFORE deserializing
  optional bytes payload_bytes = 4; // pre-serialized RenewResponsePayload
}

// Serialized into RenewResponse.payload_bytes; covered by the Ed25519 signature.
// Client must verify signature first, then check client_nonce matches the request.
message RenewResponsePayload {
  string id = 1;                    // UUID of the newly created pending record
  bytes client_nonce = 2;           // Echoed from RenewRequestPayload
  repeated ArtifactEntry artifacts = 3;
}

message ArtifactEntry {
  string filename = 1;  // e.g. "id-block.bin", "id-auth.bin", "launch-config.json"
  bytes content = 2;
}

// Management messages
message ListRecordsRequest {
  // Empty - lists all records
}

message ListRecordsResponse {
  repeated AttestationRecord records = 1;
}

message GetRecordRequest {
  string id = 1;
}

message GetRecordResponse {
  optional AttestationRecord record = 1;
}

message CreateRecordRequest {
  string os_name = 1;
  bytes firmware = 4;        // Firmware binary
  bytes kernel = 5;          // Kernel binary
  bytes initrd = 6;          // Initrd binary
  string kernel_params = 7;  // Kernel parameters
  bytes unsealing_private_key_encrypted = 9;  // Unsealing private key encrypted with ingestion public key (HPKE)
  uint32 vcpus = 10;
  string vcpu_type = 11;     // EPYC, EPYC-Milan, EPYC-Rome, EPYC-Genoa
  bool allowed_debug = 12;   // Allow debug mode (default: false)
  bool allowed_migrate_ma = 13; // Allow migration with MA (default: false)
  bool allowed_smt = 14;     // Allow Simultaneous Multithreading (default: true)
  uint32 min_tcb_bootloader = 15; // Minimum PSP bootloader version
  uint32 min_tcb_tee = 16;   // Minimum SNP firmware version
  uint32 min_tcb_snp = 17;   // Minimum SNP implementation version
  uint32 min_tcb_microcode = 18; // Minimum CPU microcode version
}

message CreateRecordResponse {
  string id = 1;
  optional string error_message = 2;
}

message DeleteRecordRequest {
  string id = 1;
}

message DeleteRecordResponse {
  bool success = 1;
  optional string error_message = 2;
}

message ToggleEnabledRequest {
  string id = 1;
}

message ToggleEnabledResponse {
  bool enabled = 1;
  optional string error_message = 2;
}

message AttestationRecord {
  string id = 1;
  string os_name = 2;
  int32 request_count = 3;
  string vcpu_type = 5;
  bool enabled = 6;
  string created_at = 7;
  string kernel_params = 8;  // Kernel parameters
  string firmware_path = 9;
  string kernel_path = 10;
  string initrd_path = 11;
  bool allowed_debug = 13;   // Allow debug mode
  bool allowed_migrate_ma = 14; // Allow migration with MA
  bool allowed_smt = 15;     // Allow Simultaneous Multithreading
  uint32 min_tcb_bootloader = 16; // Minimum PSP bootloader version
  uint32 min_tcb_tee = 17;   // Minimum SNP firmware version
  uint32 min_tcb_snp = 18;   // Minimum SNP implementation version
  uint32 min_tcb_microcode = 19; // Minimum CPU microcode version
  uint32 vcpus = 20;
}
